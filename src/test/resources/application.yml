spring:
  datasource:
    url: jdbc:h2:mem:releasepilot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

releasepilot:
  outbox:
    enabled: false
