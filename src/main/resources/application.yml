spring:
  application:
    name: releasepilot
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: ${RELEASEPILOT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/releasepilot}
    username: ${RELEASEPILOT_DATASOURCE_USERNAME:releasepilot}
    password: ${RELEASEPILOT_DATASOURCE_PASSWORD:releasepilot}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  rabbitmq:
    host: ${RELEASEPILOT_RABBITMQ_HOST:localhost}
    port: ${RELEASEPILOT_RABBITMQ_PORT:5672}
    username: ${RELEASEPILOT_RABBITMQ_USERNAME:releasepilot}
    password: ${RELEASEPILOT_RABBITMQ_PASSWORD:releasepilot}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${PORT:8080}
