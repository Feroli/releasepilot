services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: releasepilot
      POSTGRES_USER: releasepilot
      POSTGRES_PASSWORD: releasepilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U releasepilot -d releasepilot"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - releasepilot-postgres:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: releasepilot
      RABBITMQ_DEFAULT_PASS: releasepilot
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - releasepilot-rabbitmq:/var/lib/rabbitmq

volumes:
  releasepilot-postgres:
  releasepilot-rabbitmq:

